<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="black"></a-sky>

        <a-box color="blue" height="2"
                    top-radius="2" bottom-radius="2"
                    animation="
                    property: position;
                    from: -3 2 -21;
                    to: -6 2 -7; 
                    loop: true;
                    dir: altanate;
                    "
                    ></a-box>

                    <a-cone color="green" height="2"
                    top-radius="2" bottom-radius="2"
                    position="0 0 -15"
                    animation="
                    property: rotation;
                    from: 90 0 0;
                    to: 180 0 0; 
                    loop: true;
                    dir: altanate;
                    "
                    ></a-cone>

                    <a-sphere 
                    color="yellow"
                    animation="
                    property: position;
                    from: 3 2 -21;
                    to: 6 2 -7; 
                    loop: true;
                    dir: altanate;
                    "
                    ></a-sphere>  

                    <a-torus 
                    position="0 5 -15"
                    color="red"
                    radius=1
                    radius-tubular="0.25"
                    animation="
                    property: rotation;
                    from: 0 0 0;
                    to: 0 365 0; 
                    loop: true;
                    dir: altanate;
                    "
                    ></a-torus>

        </a-scene>
    </body>
</html>
