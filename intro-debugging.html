<!DOCTYPE html>
<html>
  <head>
    <title>Kaguya: Neon Dreamscape</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene fog="type: exponential; color: #1a0a2e; density: 0.012">
      
      <a-assets>
        <a-mixin id="neon-glow" material="shader: flat; emissiveIntensity: 3"></a-mixin>
        <a-mixin id="building" geometry="primitive: box" material="color: #080812"></a-mixin>
      </a-assets>

      <a-sky color="#0d0221"></a-sky>

      <a-light type="ambient" color="#332244"></a-light>
      <a-light type="hemisphere" color="#7700ff" groundColor="#000000" intensity="0.6"></a-light>

      <a-sphere position="0 80 -150" radius="30" material="shader: flat; color: #fff; emissive: #fff; emissiveIntensity: 1">
        <a-light type="point" color="#ffffff" intensity="1.5" distance="200"></a-light>
      </a-sphere>

      <a-entity position="0 0 -80">
        <a-box mixin="building" position="-30 20 0" width="10" height="60" depth="10">
            <a-plane position="0 10 5.1" width="8" height="40" color="#00ffff" mixin="neon-glow"></a-plane>
        </a-box>
        <a-box mixin="building" position="35 15 -10" width="12" height="50" depth="12">
            <a-plane position="0 5 6.1" width="10" height="30" color="#ff00ff" mixin="neon-glow"></a-plane>
        </a-box>
        <a-box mixin="building" position="0 10 -20" width="15" height="40" depth="15"></a-box>
      </a-entity>

      <a-entity position="-12 0 -15">
        <a-box width="6" height="15" depth="6" color="#050505">
           <a-plane position="0 4 3.1" width="4" height="0.5" color="#00ffff" mixin="neon-glow"></a-plane>
           <a-plane position="0 8 3.1" width="4" height="0.5" color="#ff00ff" mixin="neon-glow"></a-plane>
           <a-plane position="0 12 3.1" width="4" height="0.5" color="#00ffff" mixin="neon-glow"></a-plane>
        </a-box>
      </a-entity>

      <a-entity position="12 0 -20">
        <a-box width="5" height="12" depth="5" color="#050505">
           <a-plane position="0 2 2.6" width="3" height="6" color="#ff00ff" mixin="neon-glow"></a-plane>
        </a-box>
      </a-entity>

      <a-entity position="0 5 0">
        <a-sphere position="2 2 -5" radius="0.05" color="#ff00ff" mixin="neon-glow" animation="property: position; to: 2 10 -5; dur: 5000; loop: true; dir: alternate"></a-sphere>
        <a-sphere position="-3 1 -8" radius="0.05" color="#00ffff" mixin="neon-glow" animation="property: position; to: -3 8 -8; dur: 7000; loop: true; dir: alternate"></a-sphere>
        <a-sphere position="5 4 -12" radius="0.05" color="#ffcc00" mixin="neon-glow" animation="property: position; to: 5 1 -12; dur: 6000; loop: true; dir: alternate"></a-sphere>
      </a-entity>

      <a-plane rotation="-90 0 0" width="200" height="200" color="#0a001a" material="roughness: 0.2; metalness: 0.8"></a-plane>

      <a-entity id="rig" movement-controls="speed: 0.4">
        <a-entity camera position="0 1.6 10" look-controls>
          <a-cursor color="#ff00ff"></a-cursor>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
