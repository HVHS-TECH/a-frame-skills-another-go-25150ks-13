<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
<a-scene background="color: #0a0015">

  <!-- Camera -->
  <a-entity position="0 1.6 8">
    <a-camera></a-camera>
  </a-entity>

  <!-- Ground -->
  <a-plane rotation="-90 0 0"
           width="100"
           height="100"
           color="#111">
  </a-plane>

  <!-- Neon street -->
  <a-box position="0 0.01 0"
         width="3"
         height="0.02"
         depth="30"
         color="#ff00aa"
         material="emissive:#ff00aa">
  </a-box>

  <!-- Buildings -->
  <a-box position="-4 2 -5"
         width="3"
         height="4"
         depth="3"
         color="#2a1a40">
  </a-box>

  <a-box position="4 3 -8"
         width="3"
         height="6"
         depth="3"
         color="#1f1533">
  </a-box>

  <a-box position="-6 2 -12"
         width="3"
         height="4"
         depth="3"
         color="#2b1740">
  </a-box>

  <!-- Neon signs -->
  <a-plane position="-4 3 -4"
           width="2"
           height="1"
           color="#00ffff"
           material="emissive:#00ffff">
  </a-plane>

  <a-plane position="4 4 -7"
           width="2"
           height="1"
           color="#ff0080"
           material="emissive:#ff0080">
  </a-plane>

  <!-- Lantern lights -->
  <a-sphere position="-1 3 -3" radius="0.2"
            color="#ffcc66"
            material="emissive:#ffcc66"></a-sphere>

  <a-sphere position="1 3 -5" radius="0.2"
            color="#ffcc66"
            material="emissive:#ffcc66"></a-sphere>

  <a-sphere position="-2 3 -7" radius="0.2"
            color="#ffcc66"
            material="emissive:#ffcc66"></a-sphere>

  <!-- Neon decorative shapes -->
  <a-ring position="0 4 -10"
          radius-inner="1"
          radius-outer="1.2"
          color="#00ffff"
          material="emissive:#00ffff">
  </a-ring>

</a-scene>
</body>
</html>
