<!DOCTYPE html>
<html>
  <head>
    <title>Kaguya Neon Festival</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene fog="type: exponential; color: #050510; density: 0.015">
      
      <a-assets>
        <a-mixin id="glow-pink" material="shader: flat; color: #ff00ff; emissive: #ff00ff; emissiveIntensity: 2"></a-mixin>
        <a-mixin id="glow-cyan" material="shader: flat; color: #00ffff; emissive: #00ffff; emissiveIntensity: 2"></a-mixin>
        <a-mixin id="glow-gold" material="shader: flat; color: #ffcc00; emissive: #ffcc00; emissiveIntensity: 2"></a-mixin>
        <a-mixin id="roof-piece" geometry="primitive: box; width: 4.5; height: 0.2; depth: 4.5" material="color: #111" rotation="10 0 0"></a-mixin>
      </a-assets>

      <a-sky color="#020205"></a-sky>
      <a-sphere position="0 60 -120" radius="20" mixin="glow-gold" material="emissiveIntensity: 1"></a-sphere>

      <a-plane rotation="-90 0 0" width="100" height="200" color="#111" material="roughness: 0.1; metalness: 0.5"></a-plane>

      <a-entity position="-10 0 -10">
        <a-box position="0 4 0" width="6" height="8" depth="6" color="#050505">
          <a-plane position="0 2 3.01" width="4" height="1" mixin="glow-cyan"></a-plane>
          <a-plane position="0 5 3.01" width="4" height="1" mixin="glow-pink"></a-plane>
          <a-entity mixin="roof-piece" position="0 4 0"></a-entity>
          <a-entity mixin="roof-piece" position="0 8.2 0" scale="0.8 1 0.8"></a-entity>
        </a-box>
      </a-entity>

      <a-entity position="8 0 -5">
        <a-box position="0 1.5 0" width="3" height="3" depth="2" color="#1a1a1a">
          <a-plane position="0 2.8 1.1" width="3.2" height="0.5" mixin="glow-pink" text="value: NOODLES; align: center; color: white; width: 4"></a-plane>
          <a-sphere position="-1.5 2.5 1.5" radius="0.2" mixin="glow-gold"></a-sphere>
          <a-sphere position="1.5 2.5 1.5" radius="0.2" mixin="glow-gold"></a-sphere>
        </a-box>
      </a-entity>

      <a-entity position="0 10 -20">
        <a-sphere radius="0.1" mixin="glow-cyan" animation="property: position; from: -15 0 0; to: 15 5 -10; dur: 8000; loop: true"></a-sphere>
        <a-sphere radius="0.1" mixin="glow-pink" animation="property: position; from: 20 -2 -5; to: -20 8 -15; dur: 10000; loop: true"></a-sphere>
        <a-sphere radius="0.15" mixin="glow-gold" animation="property: position; from: -10 -5 -10; to: 10 10 5; dur: 12000; loop: true"></a-sphere>
      </a-entity>

      <a-entity position="0 8 -15">
        <a-box width="20" height="0.05" depth="0.05" color="#222"></a-box>
        <a-sphere position="-5 0 0" radius="0.3" mixin="glow-gold"></a-sphere>
        <a-sphere position="0 0 0" radius="0.3" mixin="glow-pink"></a-sphere>
        <a-sphere position="5 0 0" radius="0.3" mixin="glow-cyan"></a-sphere>
      </a-entity>

      <a-entity id="rig" movement-controls="speed: 0.3; constrainToNavMesh: false">
        <a-entity camera position="0 1.6 5" look-controls>
          <a-cursor color="#00ffff"></a-cursor>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
