<html>
<head>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
<a-scene background="color:#070012">

<!-- Camera -->
<a-entity position="0 1.6 10">
<a-camera wasd-controls="acceleration:40"></a-camera>
</a-entity>

<!-- Ground -->
<a-plane rotation="-90 0 0" width="200" height="200" color="#120a20"></a-plane>

<!-- Festival Street -->
<a-box position="0 0.02 -10" width="6" height="0.05" depth="120"
color="#ff3ca6" material="emissive:#ff3ca6"></a-box>

<!-- TORII GATES -->

<a-box position="-2 2 -5" width="0.4" height="4" depth="0.4" color="#ff3a3a"></a-box>
<a-box position="2 2 -5" width="0.4" height="4" depth="0.4" color="#ff3a3a"></a-box>
<a-box position="0 4 -5" width="5" height="0.4" depth="0.6" color="#ff3a3a"></a-box>

<a-box position="-2 2 -30" width="0.4" height="4" depth="0.4" color="#ff3a3a"></a-box>
<a-box position="2 2 -30" width="0.4" height="4" depth="0.4" color="#ff3a3a"></a-box>
<a-box position="0 4 -30" width="5" height="0.4" depth="0.6" color="#ff3a3a"></a-box>

<!-- PAGODA -->

<a-cylinder position="0 1 -60" radius="4" height="2" color="#332046"></a-cylinder>
<a-cone position="0 3 -60" radius-bottom="5" height="2" color="#251536"></a-cone>
<a-cone position="0 4.8 -60" radius-bottom="4" height="1.8" color="#251536"></a-cone>
<a-cone position="0 6.2 -60" radius-bottom="3" height="1.6" color="#251536"></a-cone>

<!-- JAPANESE HOUSES ROW -->

<!-- Left side -->
<a-box position="-8 1 -12" width="4" height="2" depth="4" color="#352046"></a-box>
<a-cone position="-8 2.7 -12" radius-bottom="3" height="1.5" color="#241433"></a-cone>

<a-box position="-8 1 -20" width="4" height="2" depth="4" color="#352046"></a-box>
<a-cone position="-8 2.7 -20" radius-bottom="3" height="1.5" color="#241433"></a-cone>

<a-box position="-8 1 -28" width="4" height="2" depth="4" color="#352046"></a-box>
<a-cone position="-8 2.7 -28" radius-bottom="3" height="1.5" color="#241433"></a-cone>

<a-box position="-8 1 -36" width="4" height="2" depth="4" color="#352046"></a-box>
<a-cone position="-8 2.7 -36" radius-bottom="3" height="1.5" color="#241433"></a-cone>

<!-- Right side -->

<a-box position="8 1 -16" width="4" height="2" depth="4" color="#352046"></a-box>
<a-cone position="8 2.7 -16" radius-bottom="3" height="1.5" color="#241433"></a-cone>

<a-box position="8 1 -24" width="4" height="2" depth="4" color="#352046"></a-box>
<a-cone position="8 2.7 -24" radius-bottom="3" height="1.5" color="#241433"></a-cone>

<a-box position="8 1 -32" width="4" height="2" depth="4" color="#352046"></a-box>
<a-cone position="8 2.7 -32" radius-bottom="3" height="1.5" color="#241433"></a-cone>

<a-box position="8 1 -40" width="4" height="2" depth="4" color="#352046"></a-box>
<a-cone position="8 2.7 -40" radius-bottom="3" height="1.5" color="#241433"></a-cone>

<!-- FESTIVAL STALLS -->

<a-box position="-3 1 -15" width="2.5" height="2" depth="2" color="#ff6c7a"></a-box>
<a-plane position="-3 2 -15" width="3" height="1.2" color="#ffb3c3"></a-plane>

<a-box position="3 1 -22" width="2.5" height="2" depth="2" color="#6c7cff"></a-box>
<a-plane position="3 2 -22" width="3" height="1.2" color="#b3bcff"></a-plane>

<a-box position="-3 1 -28" width="2.5" height="2" depth="2" color="#ff9b4d"></a-box>
<a-plane position="-3 2 -28" width="3" height="1.2" color="#ffd3a8"></a-plane>

<a-box position="3 1 -35" width="2.5" height="2" depth="2" color="#55d4ff"></a-box>
<a-plane position="3 2 -35" width="3" height="1.2" color="#b6ecff"></a-plane>

<!-- LANTERN STRINGS -->

<a-sphere position="-2 3 -8" radius="0.25" color="#ffd88a" material="emissive:#ffd88a"></a-sphere>
<a-sphere position="-1 3 -8" radius="0.25" color="#ffd88a" material="emissive:#ffd88a"></a-sphere>
<a-sphere position="0 3 -8" radius="0.25" color="#ffd88a" material="emissive:#ffd88a"></a-sphere>
<a-sphere position="1 3 -8" radius="0.25" color="#ffd88a" material="emissive:#ffd88a"></a-sphere>
<a-sphere position="2 3 -8" radius="0.25" color="#ffd88a" material="emissive:#ffd88a"></a-sphere>

<a-sphere position="-2 3 -25" radius="0.25" color="#ffd88a" material="emissive:#ffd88a"></a-sphere>
<a-sphere position="-1 3 -25" radius="0.25" color="#ffd88a" material="emissive:#ffd88a"></a-sphere>
<a-sphere position="0 3 -25" radius="0.25" color="#ffd88a" material="emissive:#ffd88a"></a-sphere>
<a-sphere position="1 3 -25" radius="0.25" color="#ffd88a" material="emissive:#ffd88a"></a-sphere>
<a-sphere position="2 3 -25" radius="0.25" color="#ffd88a" material="emissive:#ffd88a"></a-sphere>

<!-- NEON SIGNS -->

<a-plane position="-7 3 -18" width="2" height="1" color="#00f7ff"
material="emissive:#00f7ff"></a-plane>

<a-plane position="7 3 -30" width="2" height="1" color="#ff4fcf"
material="emissive:#ff4fcf"></a-plane>

<!-- FIREWORKS STYLE LIGHTS -->

<a-sphere position="-10 12 -50" radius="0.4"
color="#ff4fd0" material="emissive:#ff4fd0"></a-sphere>

<a-sphere position="10 10 -45" radius="0.4"
color="#4ff3ff" material="emissive:#4ff3ff"></a-sphere>

<a-sphere position="0 14 -55" radius="0.4"
color="#ffd84f" material="emissive:#ffd84f"></a-sphere>

</a-scene>
</body>
</html>
