<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
<a-scene background="color:#0b0018">

  <!-- Camera -->
  <a-entity position="0 1.6 8">
    <a-camera></a-camera>
  </a-entity>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="100" height="100" color="#1a0f2e"></a-plane>

  <!-- Main festival street -->
  <a-box position="0 0.01 -5" width="4" height="0.02" depth="40"
         color="#ff4fa3" material="emissive:#ff4fa3"></a-box>

  <!-- Japanese house -->
  <a-box position="-4 1 -6" width="3" height="2" depth="3" color="#3a2a45"></a-box>
  <a-cone position="-4 2.8 -6" radius-bottom="2.5" radius-top="0.1" height="1.5"
          color="#2b1c34"></a-cone>

  <a-box position="4 1 -10" width="3" height="2" depth="3" color="#3a2a45"></a-box>
  <a-cone position="4 2.8 -10" radius-bottom="2.5" radius-top="0.1" height="1.5"
          color="#2b1c34"></a-cone>

  <a-box position="-5 1 -14" width="3" height="2" depth="3" color="#3a2a45"></a-box>
  <a-cone position="-5 2.8 -14" radius-bottom="2.5" radius-top="0.1" height="1.5"
          color="#2b1c34"></a-cone>

  <!-- Torii gate -->
  <a-box position="0 2 -3" width="0.4" height="4" depth="0.4" color="#ff3c3c"></a-box>
  <a-box position="2 2 -3" width="0.4" height="4" depth="0.4" color="#ff3c3c"></a-box>
  <a-box position="1 4 -3" width="3.5" height="0.4" depth="0.6" color="#ff3c3c"></a-box>

  <!-- Lantern string -->
  <a-sphere position="-1 3 -4" radius="0.25" color="#ffd27f" material="emissive:#ffd27f"></a-sphere>
  <a-sphere position="0 3 -4" radius="0.25" color="#ffd27f" material="emissive:#ffd27f"></a-sphere>
  <a-sphere position="1 3 -4" radius="0.25" color="#ffd27f" material="emissive:#ffd27f"></a-sphere>
  <a-sphere position="2 3 -4" radius="0.25" color="#ffd27f" material="emissive:#ffd27f"></a-sphere>

  <!-- Festival stalls -->
  <a-box position="-2 0.8 -8" width="2" height="1.5" depth="1.5" color="#ff6b6b"></a-box>
  <a-plane position="-2 1.8 -8" width="2.5" height="1" color="#ff9db6"></a-plane>

  <a-box position="2 0.8 -12" width="2" height="1.5" depth="1.5" color="#6b9cff"></a-box>
  <a-plane position="2 1.8 -12" width="2.5" height="1" color="#9dc0ff"></a-plane>

  <!-- Decorative neon shapes -->
  <a-ring position="0 5 -15" radius-inner="1" radius-outer="1.2"
          color="#00f7ff" material="emissive:#00f7ff"></a-ring>

</a-scene>
</body>
</html>
