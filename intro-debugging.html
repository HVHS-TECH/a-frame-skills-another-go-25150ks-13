<!DOCTYPE html>
<html>
  <head>
    <title>Kaguya Festival - All Buildings Visible</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene fog="type: exponential; color: #1a0a2e; density: 0.01">
      
      <a-assets>
        <a-mixin id="neon-pink" material="shader: flat; color: #ff00ff; emissive: #ff00ff; emissiveIntensity: 3"></a-mixin>
        <a-mixin id="neon-cyan" material="shader: flat; color: #00ffff; emissive: #00ffff; emissiveIntensity: 3"></a-mixin>
        <a-mixin id="shrine-red" material="color: #b01a1a; emissive: #ff4400; emissiveIntensity: 0.3"></a-mixin>
        <a-mixin id="pagoda-roof" geometry="primitive: cone; radiusBottom: 4; height: 1.5; segmentsRadial: 4" material="color: #111" rotation="0 45 0"></a-mixin>
      </a-assets>

      <a-entity environment="preset: starry; groundColor: #050510; grid: none; dressing: none"></a-entity>

      <a-entity position="0 0 -10">
        <a-cylinder mixin="shrine-red" position="-4 4 0" radius="0.4" height="8"></a-cylinder>
        <a-cylinder mixin="shrine-red" position="4 4 0" radius="0.4" height="8"></a-cylinder>
        <a-box mixin="shrine-red" position="0 7.5 0" width="10" height="0.5" depth="0.8"></a-box>
        <a-box mixin="neon-cyan" position="0 7.6 0.5" width="10.2" height="0.1" depth="0.1" material="shader: flat"></a-box>
      </a-entity>

      <a-entity position="-10 0 -20">
        <a-box mixin="shrine-red" width="6" height="12" depth="6" position="0 6 0">
          <a-entity mixin="pagoda-roof" position="0 6 0" scale="1.5 1 1.5"></a-entity>
          <a-entity mixin="pagoda-roof" position="0 12 0"></a-entity>
          <a-plane position="0 3 3.1" width="3" height="4" mixin="neon-pink"></a-plane>
        </a-box>
      </a-entity>

      <a-entity position="8 0 -12">
        <a-box mixin="shrine-red" width="4" height="3" depth="3" position="0 1.5 0">
           <a-plane position="0 2.5 1.6" width="3.5" height="0.8" mixin="neon-cyan" text="value: SPIRIT SHOP; align: center; width: 6"></a-plane>
        </a-box>
      </a-entity>

      <a-entity position="0 10 -15">
        <a-cone radius-bottom="1.5" height="0.2" color="#ff00ff" position="-5 2 -5" rotation="20 0 10" mixin="neon-pink"></a-cone>
        <a-cone radius-bottom="1.5" height="0.2" color="#00ffff" position="6 4 -8" rotation="-10 0 -20" mixin="neon-cyan"></a-cone>
      </a-entity>

      <a-light type="ambient" color="#442266" intensity="0.5"></a-light>
      <a-light type="point" position="0 10 -5" color="#ffaa00" intensity="1"></a-light>

      <a-entity id="rig" movement-controls="speed: 0.3">
        <a-entity camera position="0 1.6 5" look-controls>
          <a-cursor color="#00ffff"></a-cursor>
        </a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
