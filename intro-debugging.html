<!DOCTYPE html>
<html>
  <head>
    <title>Kaguya: The Golden Festival</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene fog="type: exponential; color: #441122; density: 0.015">
      
      <a-assets>
        <a-mixin id="shrine-red" material="color: #b01a1a; emissive: #ff4400; emissiveIntensity: 0.4"></a-mixin>
        <a-mixin id="neon-glow" material="shader: flat; emissiveIntensity: 2.5"></a-mixin>
        <a-mixin id="banner" geometry="primitive: plane; width: 15; height: 1" material="side: double; transparent: true; opacity: 0.9"></a-mixin>
      </a-assets>

      <a-sky color="#1a0a2e"></a-sky>
      <a-light type="ambient" color="#ff9999" intensity="0.5"></a-light>
      <a-light type="hemisphere" color="#ffcc00" groundColor="#441122" intensity="0.8"></a-light>

      <a-entity position="0 10 -10" rotation="0 0 5">
        <a-entity mixin="banner" material="color: #ff4444" position="0 0 0" rotation="80 10 0"></a-entity>
        <a-entity mixin="banner" material="color: #ffcc00" position="0 1 -5" rotation="85 -15 0"></a-entity>
        <a-entity mixin="banner" material="color: #00ffff" position="0 2 -10" rotation="75 5 0"></a-entity>
      </a-entity>

      <a-entity position="0 6 -5">
        <a-sphere radius="0.15" color="#00ffff" mixin="neon-glow" animation="property: position; from: -10 0 -10; to: 10 5 0; dur: 8000; loop: true"></a-sphere>
        <a-cone radius-bottom="1.5" height="0.5" color="#ff00ff" material="opacity: 0.8" position="4 2 -8" rotation="20 0 0" mixin="neon-glow"></a-cone>
        <a-cone radius-bottom="1.5" height="0.5" color="#ffaa00" material="opacity: 0.8" position="-5 4 -12" rotation="-15 0 0" mixin="neon-glow"></a-cone>
      </a-entity>

      <a-entity position="-6 0 -5">
        <a-box mixin="shrine-red" width="3" height="3" depth="3" position="0 1.5 0"></a-box>
        <a-box position="0 3 0" width="3.5" height="0.2" depth="3.5" color="#111" rotation="10 0 0"></a-box>
        <a-plane position="0 2 1.51" width="2" height="1.5" color="#00ffff" mixin="neon-glow" text="value: KAGUYA; align: center; width: 5"></a-plane>
      </a-entity>

      <a-entity position="6 0 -8">
        <a-box mixin="shrine-red" width="3" height="3" depth="3" position="0 1.5 0"></a-box>
        <a-box position="0 3 0" width="3.5" height="0.2" depth="3.5" color="#111" rotation="10 0 0"></a-box>
        <a-plane position="0 2 1.51" width="2" height="1.5" color="#ff00ff" mixin="neon-glow"></a-plane>
      </a-entity>

      <a-entity position="0 0 -30">
        <a-box mixin="shrine-red" width="10" height="20" depth="10" position="0 10 0">
          <a-entity geometry="primitive: cone; radiusBottom: 8; height: 4; segmentsRadial: 4" position="0 12 0" rotation="0 45 0" color="#111"></a-entity>
          <a-plane position="0 10 5.1" width="6" height="6" color="#00ffff" mixin="neon-glow" material="opacity: 0.5"></a-plane>
        </a-box>
      </a-entity>

      <a-plane rotation="-90 0 0" width="100" height="100" color="#220011" material="roughness: 0.1"></a-plane>

      <a-entity movement-controls="speed: 0.3">
        <a-entity camera position="0 1.6 5" look-controls></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
